name: Publish to npm

# Publishes the library when a version tag (v*) is pushed.
# Requires an npm automation token stored as the NPM_TOKEN repository secret.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter ng-number-flow build

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/ng-number-flow/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
