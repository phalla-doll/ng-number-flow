name: Deploy demo to GitHub Pages

on:
  # Deploy on every push to main…
  push:
    branches: [main]
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Project Pages are served from https://<user>.github.io/ng-number-flow/,
      # so the app must be built with a matching base href.
      - name: Build demo
        run: pnpm --filter demo exec ng build --base-href /ng-number-flow/

      # SPA fallback (404 -> index.html) + disable Jekyll processing.
      - name: Prepare static output
        run: |
          cp apps/demo/dist/demo/browser/index.html apps/demo/dist/demo/browser/404.html
          touch apps/demo/dist/demo/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/demo/dist/demo/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
